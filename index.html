<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

	<title>GD Hub</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			font-family: Arial, sans-serif;
			background: #1a1a1a;
			color: #fff;
		}

		#app {
			width: 100%;
			height: 100vh;
		}

		iframe {
			width: 100%;
			height: 100%;
			border: none;
		}

		#loading {
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			font-size: 18px;
		}
	</style>
</head>

<body>
	<div id="app">
		<div id="loading">Cargando...</div>
	</div>

	<script>
		// Obtener parámetro 'page' de la URL
		const params = new URLSearchParams(window.location.search);
		const page = params.get('page') || 'main';

		// Mapeo de páginas a archivos
		const pages = {
			'editor': 'editor.html',
			'player': 'player.html',
			'daw': 'daw.html',
			'main': 'main.html'
		};

		// Obtener el archivo correspondiente
		const file = pages[page] || pages['main'];

		// Cargar el archivo en un iframe
		const app = document.getElementById('app');
		app.innerHTML = `<iframe src="${file}"></iframe>`;

		// Opcional: cambiar el título de la página
		const titles = {
			'editor': 'GD Level Editor',
			'player': 'Geometry Dash',
			'daw': 'GD D.A.W.',
			'main': 'GD Help Menu'
		};
		document.title = titles[page] || 'GD';
	</script>
</body>

</html>
